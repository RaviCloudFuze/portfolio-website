<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="Insurance Portal">
  <defs>
    <linearGradient id="ip-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="50%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="ip-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <pattern id="ip-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#ip-bg)"/>
  <rect width="1200" height="750" fill="url(#ip-grid)"/>

  <!-- floating document cards -->
  <g opacity="0.6">
    <rect x="160" y="180" width="200" height="260" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <rect x="190" y="215" width="140" height="10" rx="5" fill="rgba(255,255,255,0.35)"/>
    <rect x="190" y="240" width="100" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="190" y="258" width="120" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="190" y="276" width="80" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="190" y="360" width="100" height="30" rx="6" fill="rgba(99,102,241,0.7)"/>

    <rect x="860" y="280" width="200" height="260" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <rect x="890" y="315" width="140" height="10" rx="5" fill="rgba(255,255,255,0.35)"/>
    <rect x="890" y="340" width="100" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="890" y="358" width="120" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>
    <rect x="890" y="460" width="100" height="30" rx="6" fill="rgba(139,92,246,0.7)"/>
  </g>

  <!-- shield -->
  <path d="M600 160 L790 240 Q808 260 798 340 Q770 520 600 610 Q430 520 402 340 Q392 260 410 240 Z"
        fill="url(#ip-shield)" stroke="rgba(255,255,255,0.6)" stroke-width="3"/>
  <!-- checkmark -->
  <path d="M512 382 L580 448 L704 304"
        stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- label -->
  <text x="600" y="695" text-anchor="middle" font-family="-apple-system, Segoe UI, system-ui, sans-serif"
        font-size="28" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="6">
    INSURANCE PORTAL
  </text>
</svg>
